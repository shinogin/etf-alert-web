<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF下落通知</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#111111" />
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0 12px 80px; }
  header { position: sticky; top: 0; background: Canvas; padding: 12px 0; border-bottom: 1px solid #8883; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  nav { display: flex; gap: 8px; }
  nav button { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #8882; font-size: 14px; }
  nav button.active { background: #333; color: #fff; }
  input[type="search"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #8886; margin: 8px 0; box-sizing: border-box; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #8882; }
  .row .name { font-weight: 600; font-size: 14px; }
  .row .code { font-size: 12px; opacity: 0.6; }
  .pct-down { color: #d33; }
  .pct-up, .pct-flat { color: inherit; }
  .toggle { padding: 6px 10px; border-radius: 6px; border: 1px solid #8886; background: none; font-size: 12px; }
  .toggle.on { background: #333; color: #fff; }
  section { display: none; }
  section.active { display: block; }
  .empty { opacity: 0.6; padding: 20px 0; text-align: center; font-size: 14px; }
  .card { border: 1px solid #8884; border-radius: 10px; padding: 12px; margin: 10px 0; }
  .levels input { width: 100%; padding: 8px; box-sizing: border-box; }
  .btn-primary { background: #333; color: #fff; border: none; padding: 10px 14px; border-radius: 8px; }
</style>
</head>
<body>
<header>
  <h1>ETF下落通知</h1>
  <nav>
    <button data-tab="home" class="active">ホーム</button>
    <button data-tab="catalog">カタログ</button>
    <button data-tab="history">通知履歴</button>
    <button data-tab="settings">設定</button>
  </nav>
</header>

<section id="home" class="active">
  <h2>今日の通知</h2>
  <div id="today-list" class="empty">本日の通知はありません</div>
  <h2>監視ETF</h2>
  <div id="watched-list" class="empty">監視中のETFはありません</div>
  <h2>お気に入り</h2>
  <div id="favorite-list" class="empty">お気に入りはありません</div>
</section>

<section id="catalog">
  <input type="search" id="search-box" placeholder="銘柄名・コード・愛称・運用会社・指数で検索" />
  <div id="catalog-list"></div>
</section>

<section id="history">
  <div id="history-list" class="empty">通知履歴はまだありません</div>
</section>

<section id="settings">
  <div class="card">
    <p>通知を受け取るには、まずこの端末を登録してください。</p>
    <button id="enable-push" class="btn-primary">この端末で通知を受け取る</button>
    <p id="push-status" style="font-size:12px;opacity:0.7;"></p>
  </div>
  <div class="card levels">
    <label>既定通知レベル(カンマ区切り、例: -3,-5,-7,-10)</label>
    <input id="default-levels" type="text" />
    <button id="save-levels" class="btn-primary" style="margin-top:8px;">保存</button>
  </div>
  <div class="card">
    <p style="font-size:12px;opacity:0.7;">
      本アプリは投資助言を行うものではありません。投資判断はご自身の責任で行ってください。<br/>
      通知は1日数回のバックグラウンドチェックに依存するため、リアルタイム性はありません。
    </p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
